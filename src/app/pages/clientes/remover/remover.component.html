<div class="excluir-container">
    <form (ngSubmit)="removerCliente()">
      <label for="input-id">Informe o ID do cliente para excluir:</label>
      <input
        type="text"  id="input-id"
        name="idExcluir"
        [(ngModel)]="idExcluir"
        class="input-id"
        required
      />
      <button type="submit" class="btn-excluir">Remover</button>
    </form>
    
    <div *ngIf="erroMensagem" class="erro-mensagem">
      {{ erroMensagem }}
    </div>
</div>
